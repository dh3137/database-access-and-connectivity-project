<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vehicle Details — AutoPrime</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* Car image */
    .car-image-wrap {
      width: 100%;
      height: 280px;
      background: #e2e8f0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    }
    .car-image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .car-image-wrap .img-placeholder {
      font-size: 5rem;
      color: #94a3b8;
    }

    /* Specs table */
    .specs-table { width: 100%; border-collapse: collapse; }
    .specs-table tr { border-bottom: 1px solid var(--border); }
    .specs-table tr:last-child { border-bottom: none; }
    .specs-table td { padding: 14px 20px; }
    .specs-table td:first-child { color: var(--muted); font-size: .82rem; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; width: 36%; }
    .specs-table td:last-child  { font-weight: 600; color: var(--text); font-size: .93rem; }

    /* Description */
    .desc-block {
      padding: 18px 20px;
      border-top: 1px solid var(--border);
      color: var(--text-2);
      font-size: .88rem;
      line-height: 1.65;
    }

    /* Car heading area */
    .car-heading {
      margin-bottom: 20px;
    }
  </style>
</head>
<body class="public-page">

<header class="public-nav">
  <a href="/" class="public-nav-logo">◈ AutoPrime</a>
  <div id="nav-actions"></div>
</header>

<div class="public-detail-wrap">

      <div style="margin-bottom:20px;">
        <a id="back-link" href="/" class="back-link">← Back to Vehicles</a>
      </div>

      <div class="car-heading">
        <h1 id="heading" class="page-title"></h1>
        <div id="status-badge" style="margin-top:8px;"></div>
      </div>

      <div class="card">
        <div class="car-image-wrap" id="img-wrap">
          <span class="img-placeholder">🚗</span>
        </div>

        <table class="specs-table">
          <tbody id="rows"></tbody>
        </table>

        <div class="desc-block" id="desc-block" style="display:none;"></div>
      </div>

</div>

<script>
  async function init() {
    // Check if user is logged in — optional, only affects nav
    let me = null;
    try {
      const meRes = await fetch("/api/me", { credentials: "include" });
      const data = await meRes.json();
      if (!data.error) me = data;
    } catch (_) {}

    const navActions = document.getElementById("nav-actions");
    if (me) {
      const dashHref = me.role.toUpperCase() === "ADMIN" ? "/dashboard.html" : "/cars.html";
      navActions.innerHTML = `<a href="${dashHref}" class="staff-btn">Dashboard</a>`;
      document.getElementById("back-link").href = dashHref;
    } else {
      navActions.innerHTML = `<a href="/login.html" class="staff-btn">Staff Login</a>`;
    }

    const id = new URLSearchParams(location.search).get("id");
    if (!id) { showError("No car ID specified."); return; }

    const carRes = await fetch(`/api/cars/${id}`);
    const car = await carRes.json();
    if (car.error) { showError(car.error); return; }

    document.title = `${car.year} ${car.make} ${car.model} — AutoPrime`;
    document.getElementById("heading").textContent = `${car.year} ${car.make} ${car.model}`;

    const badgeClass = { AVAILABLE: 'badge-available', SOLD: 'badge-sold', RESERVED: 'badge-reserved' }[car.status] || 'badge-available';
    const badgeLabel = car.status ? car.status.charAt(0) + car.status.slice(1).toLowerCase() : 'Available';
    document.getElementById("status-badge").innerHTML = `<span class="badge ${badgeClass}">${badgeLabel}</span>`;

    // Car image
    const imgWrap = document.getElementById("img-wrap");
    if (car.imageUrl && car.imageUrl.trim()) {
      imgWrap.innerHTML = `<img src="${escHtml(car.imageUrl)}" alt="${escHtml(car.year + ' ' + car.make + ' ' + car.model)}" onerror="this.parentElement.innerHTML='<span class=\\'img-placeholder\\'>🚗</span>'" />`;
    } else {
      // Lazy-fetch from Wikipedia
      try {
        const r = await fetch(`/api/carimage?make=${encodeURIComponent(car.make)}&model=${encodeURIComponent(car.model)}&year=${encodeURIComponent(car.year)}&id=${car.id}`);
        const d = await r.json();
        if (d.url) {
          imgWrap.innerHTML = `<img src="${escHtml(d.url)}" alt="${escHtml(car.year + ' ' + car.make + ' ' + car.model)}" onerror="this.parentElement.innerHTML='<span class=\\'img-placeholder\\'>🚗</span>'" />`;
        }
      } catch (_) {}
    }

    // Specs
    const rows = [
      ["ID",      car.id],
      ["Make",    car.make],
      ["Model",   car.model],
      ["Year",    car.year],
      ["Color",   car.color || "—"],
      ["Mileage", car.mileage ? car.mileage.toLocaleString() + " km" : "—"],
      ["Price",   "$" + car.price.toLocaleString("en-US", { minimumFractionDigits: 2 })],
    ];
    document.getElementById("rows").innerHTML = rows.map(([label, val]) =>
      `<tr><td>${escHtml(label)}</td><td>${escHtml(String(val))}</td></tr>`
    ).join("");

    if (car.description && car.description.trim()) {
      const descBlock = document.getElementById("desc-block");
      descBlock.textContent = car.description;
      descBlock.style.display = "block";
    }
  }

  function showError(msg) {
    document.getElementById("heading").textContent = "Vehicle not found";
    document.getElementById("rows").innerHTML = `<tr><td colspan="2">${escHtml(msg)}</td></tr>`;
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  init();
</script>

</body>
</html>
