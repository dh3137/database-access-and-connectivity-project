<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoPrime — Premium Vehicle Dealership</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* ── Hero ── */
    .hero {
      padding: 80px 40px 60px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    .hero-logo {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 24px;
    }
    .hero h1 {
      font-size: clamp(2rem, 5vw, 3.4rem);
      font-weight: 800;
      color: var(--text);
      line-height: 1.15;
      margin-bottom: 16px;
    }
    .hero p {
      color: var(--muted);
      font-size: 1rem;
      max-width: 480px;
      margin: 0 auto 32px;
      line-height: 1.6;
    }
    .staff-btn {
      position: absolute;
      top: 24px;
      right: 32px;
    }

    /* ── Catalogue ── */
    .catalogue-wrap { max-width: 1200px; margin: 0 auto; padding: 40px 24px 80px; }
    .catalogue-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      gap: 12px;
      flex-wrap: wrap;
    }
    .catalogue-title { font-size: 1.1rem; font-weight: 700; color: var(--text); }
    .catalogue-count { font-size: .82rem; color: var(--muted); }

    /* Filter bar reused from style.css */
    .catalogue-filters { margin-bottom: 28px; }

    /* ── Car grid ── */
    .car-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }
    .car-card {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      cursor: pointer;
      transition: transform var(--dur-fast) var(--ease), box-shadow var(--dur-fast) var(--ease);
    }
    .car-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-md);
    }
    .car-card-img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
      background: var(--surface-3);
    }
    .car-card-img-placeholder {
      width: 100%;
      height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface-3);
      font-size: 3rem;
    }
    .car-card-body { padding: 16px 18px; }
    .car-card-title { font-weight: 700; color: var(--text); font-size: .97rem; margin-bottom: 4px; }
    .car-card-sub   { font-size: .8rem; color: var(--muted); margin-bottom: 12px; }
    .car-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .car-card-price { font-weight: 800; color: var(--accent); font-size: 1rem; }

    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 0;
      color: var(--muted);
      font-size: .9rem;
    }

    /* Loading shimmer */
    .shimmer {
      background: linear-gradient(90deg, var(--surface-2) 25%, var(--surface-3) 50%, var(--surface-2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: var(--radius);
    }
    @keyframes shimmer { to { background-position: -200% 0; } }
    .shimmer-card {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    .shimmer-img  { height: 180px; }
    .shimmer-body { padding: 16px 18px; display: flex; flex-direction: column; gap: 10px; }
    .shimmer-line { height: 14px; border-radius: 4px; }
    .shimmer-line.short { width: 55%; }
  </style>
</head>
<body class="public-page">

<!-- Hero -->
<header class="hero">
  <a href="/login.html" class="staff-btn">Staff Login</a>
  <div class="hero-logo">◈ AutoPrime</div>
  <h1>Find Your Perfect Vehicle</h1>
  <p>Browse our full inventory of premium vehicles. No account needed.</p>
</header>

<!-- Catalogue -->
<div class="catalogue-wrap">

  <div class="catalogue-header">
    <span class="catalogue-title">Available Vehicles</span>
    <span class="catalogue-count" id="count"></span>
  </div>

  <div class="filter-bar catalogue-filters">
    <input type="text"   id="f-search"    placeholder="Search make or model…" oninput="applyFilters()" />
    <select id="f-status" onchange="applyFilters()">
      <option value="">All statuses</option>
      <option value="AVAILABLE">Available</option>
      <option value="SOLD">Sold</option>
      <option value="RESERVED">Reserved</option>
    </select>
    <input type="number" id="f-min-price" placeholder="Min $"     oninput="applyFilters()" />
    <input type="number" id="f-max-price" placeholder="Max $"     oninput="applyFilters()" />
    <input type="number" id="f-min-year"  placeholder="From year" oninput="applyFilters()" />
    <input type="number" id="f-max-year"  placeholder="To year"   oninput="applyFilters()" />
  </div>

  <div class="car-grid" id="car-grid">
    <!-- shimmer placeholders while loading -->
    ${Array(6).fill(`
    <div class="shimmer-card">
      <div class="shimmer shimmer-img"></div>
      <div class="shimmer-body">
        <div class="shimmer shimmer-line"></div>
        <div class="shimmer shimmer-line short"></div>
      </div>
    </div>`).join('')}
  </div>

</div>

<script>
  let allCars = [];

  async function init() {
    const res  = await fetch("/api/cars");
    const cars = await res.json();
    if (cars.error) {
      document.getElementById("car-grid").innerHTML =
        '<div class="empty-state">Could not load vehicles. Please try again later.</div>';
      return;
    }
    allCars = cars;
    applyFilters();
  }

  function applyFilters() {
    const search   = document.getElementById("f-search").value.trim().toLowerCase();
    const status   = document.getElementById("f-status").value;
    const minPrice = parseFloat(document.getElementById("f-min-price").value) || 0;
    const maxPrice = parseFloat(document.getElementById("f-max-price").value) || Infinity;
    const minYear  = parseInt(document.getElementById("f-min-year").value)  || 0;
    const maxYear  = parseInt(document.getElementById("f-max-year").value)  || 9999;

    const filtered = allCars.filter(c => {
      if (search && !c.make.toLowerCase().includes(search) && !c.model.toLowerCase().includes(search)) return false;
      if (status && c.status !== status) return false;
      if (c.price < minPrice || c.price > maxPrice) return false;
      if (c.year  < minYear  || c.year  > maxYear)  return false;
      return true;
    });

    document.getElementById("count").textContent = filtered.length + " vehicle" + (filtered.length !== 1 ? "s" : "");
    renderGrid(filtered);
  }

  function renderGrid(cars) {
    const grid = document.getElementById("car-grid");
    if (cars.length === 0) {
      grid.innerHTML = '<div class="empty-state">No vehicles match your filters.</div>';
      return;
    }
    grid.innerHTML = cars.map(car => {
      const imgHtml = car.imageUrl && car.imageUrl.trim()
        ? `<img class="car-card-img" src="${escHtml(car.imageUrl)}" alt="${escHtml(car.year + ' ' + car.make + ' ' + car.model)}"
             onerror="this.outerHTML='<div class=\\'car-card-img-placeholder\\'>🚗</div>'" />`
        : `<div class="car-card-img-placeholder" data-id="${car.id}" data-make="${escHtml(car.make)}" data-model="${escHtml(car.model)}" data-year="${car.year}">🚗</div>`;

      const badgeCls = { AVAILABLE:'badge-available', SOLD:'badge-sold', RESERVED:'badge-reserved' }[car.status] || 'badge-available';
      const badgeTxt = car.status ? car.status.charAt(0) + car.status.slice(1).toLowerCase() : 'Available';

      return `
        <div class="car-card" onclick="location.href='/vehicle-details.html?id=${car.id}'">
          ${imgHtml}
          <div class="car-card-body">
            <div class="car-card-title">${escHtml(car.year + ' ' + car.make + ' ' + car.model)}</div>
            <div class="car-card-sub">${escHtml(car.color || '')}${car.mileage ? ' · ' + car.mileage.toLocaleString() + ' km' : ''}</div>
            <div class="car-card-footer">
              <span class="car-card-price">$${car.price.toLocaleString("en-US", {minimumFractionDigits:2})}</span>
              <span class="badge ${badgeCls}">${badgeTxt}</span>
            </div>
          </div>
        </div>`;
    }).join('');

    // Lazy-fetch Wikipedia images for cards without one
    grid.querySelectorAll('.car-card-img-placeholder[data-make]').forEach(async el => {
      const { make, model, year, id } = el.dataset;
      try {
        const r = await fetch(`/api/carimage?make=${encodeURIComponent(make)}&model=${encodeURIComponent(model)}&year=${encodeURIComponent(year)}&id=${id}`);
        const d = await r.json();
        if (d.url) {
          const img = document.createElement('img');
          img.className = 'car-card-img';
          img.src = d.url;
          img.alt = year + ' ' + make + ' ' + model;
          img.onerror = () => {}; // keep placeholder on failure
          el.replaceWith(img);
        }
      } catch (_) {}
    });
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  init();
</script>

</body>
</html>
