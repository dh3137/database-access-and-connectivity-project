<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — VELOCE</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="login-page">

<div class="login-wrap">

  <div class="login-logo">
    <div class="login-logo-mark">VELOCE</div>
    <p>Staff Portal</p>
  </div>

  <div class="login-card">
    <h2>Sign in</h2>
    <p>Enter your credentials to access the dashboard.</p>

    <div id="error-msg" class="error-msg" style="display:none;margin-bottom:16px;">
      Invalid username or password. Please try again.
    </div>

    <form class="login-form" method="post" action="/api/login">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="your username" autocomplete="username" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn btn-primary">Sign in →</button>
    </form>
  </div>

</div>

<script>
  if (new URLSearchParams(location.search).get("error")) {
    document.getElementById("error-msg").style.display = "block";
  }
</script>

</body>
</html>
