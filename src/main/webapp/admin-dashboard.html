<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — AutoPrime</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body { background: #edf0f5; }
    .card { padding: 0; overflow: hidden; }
    .card-header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      font-size: .88rem;
      font-weight: 700;
      color: var(--navy);
    }
    tbody tr { cursor: pointer; }
  </style>
</head>
<body>

<div class="admin-shell">

  <aside class="sidebar">
    <div class="sidebar-logo">AutoPrime</div>
    <a href="admin-dashboard.html" class="active">Vehicles</a>
  </aside>

  <main class="admin-main">

    <div>
      <h1 style="font-size:1.2rem;font-weight:700;color:var(--navy);margin-bottom:4px;">Vehicle Inventory</h1>
      <p style="color:var(--muted);font-size:.88rem;">Click a row to view details.</p>
    </div>

    <div class="card">
      <div class="card-header">All Vehicles</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Make</th>
              <th>Model</th>
              <th>Year</th>
              <th>Price</th>
            </tr>
          </thead>
          <tbody>
            <tr onclick="location.href='vehicle-details.html?id=1'">
              <td class="muted">1</td>
              <td><strong>Toyota</strong></td>
              <td>Corolla</td>
              <td>2021</td>
              <td>$18,500.00</td>
            </tr>
            <tr onclick="location.href='vehicle-details.html?id=2'">
              <td class="muted">2</td>
              <td><strong>Volkswagen</strong></td>
              <td>Golf</td>
              <td>2020</td>
              <td>$17,200.00</td>
            </tr>
            <tr onclick="location.href='vehicle-details.html?id=3'">
              <td class="muted">3</td>
              <td><strong>BMW</strong></td>
              <td>320d</td>
              <td>2022</td>
              <td>$31,500.00</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>
</div>

</body>
</html>
